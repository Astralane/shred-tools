# shred-audit config. Copy to config.yaml and run: ./shred-audit --config config.yaml
#
# This is all you need to get started. Every other setting has a sensible
# default — see the "Optional" section at the bottom only if you want to tune.

# Mainnet RPC, used only to fetch the leader schedule (not on the hot path).
rpc_url: "https://api.mainnet-beta.solana.com"

# UDP ports shred-audit listens on. Give each provider one port and tell them
# to send there.
listen_ports: [20001, 20002]

# One entry per provider. Easiest setup: match by the port they send to.
providers:
  - name: alpha
    port: 20001
  - name: beta
    port: 20002

# ---------------------------------------------------------------------------
# Optional — uncomment and edit only if you need it. Defaults shown.
# ---------------------------------------------------------------------------
#
# bind_ip: "0.0.0.0"        # interface to bind
# output_dir: "./out"       # where archives are written
# rotate_secs: 600          # new archive every N secs (0 = one archive at exit)
# shred_version: null       # drop shreds not matching this version (null = all)
#
# Match a provider by source IP instead of / in addition to port:
# providers:
#   - name: gamma
#     ips: ["203.0.113.7"]
#
# Compare shred delivery against Geyser/Yellowstone gRPC feeds by transaction
# arrival time:
# grpc_sources:
#   - name: my-grpc
#     url: "https://grpc.example.com:443"
#     x_token: "optional-auth-token"
#     commitment: processed   # processed | confirmed | finalized
