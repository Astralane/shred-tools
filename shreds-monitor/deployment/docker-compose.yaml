services:
  clickhouse:
    image: clickhouse/clickhouse-server:26.4
    container_name: shreds-monitor-clickhouse
    ports:
      - "18123:8123"
      - "19000:9000"
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: default
      CLICKHOUSE_DB: default
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ch-data:/var/lib/clickhouse
      - ./clickhouse/configs/config.d:/etc/clickhouse-server/config.d:ro
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user default --password default --query 'SELECT 1' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  leader-schedule:
    image: python:3.12-slim
    container_name: shreds-monitor-leader-schedule
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: default
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://api.mainnet-beta.solana.com}
      ENABLE_PING: "0"
    volumes:
      - ./leader-schedule/populate_leader_schedule.py:/app/populate_leader_schedule.py:ro
    command: ["sh", "-c", "while true; do echo 'populating leader schedule...'; python /app/populate_leader_schedule.py || echo 'populate failed'; sleep 86400; done"]

  grafana:
    image: grafana/grafana:latest
    container_name: shreds-monitor-grafana
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

  shreds-monitor:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    image: shreds-monitor:local
    container_name: shreds-monitor
    depends_on:
      clickhouse:
        condition: service_healthy
    network_mode: host
    volumes:
      - ./monitor.yaml:/etc/shreds-monitor/monitor.yaml:ro
    command: ["--config-path", "/etc/shreds-monitor/monitor.yaml"]
    environment:
      RUST_LOG: ${RUST_LOG:-info}
    restart: unless-stopped

volumes:
  ch-data:
  grafana-data:
