# Prometheus scrape config for the "Shreds monitor" dashboard. Scrapes one
# instance on the docker host: expose its metrics on port 19091
# (`metrics.port` in its config; 0 disables metrics).

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: shreds-monitor
    static_configs:
      - targets:
          - host.docker.internal:19091
