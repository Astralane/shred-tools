# File-provision the providers-monitoring dashboard so it loads on boot.
apiVersion: 1

providers:
  - name: shreds-monitor
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
